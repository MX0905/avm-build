name: Build Official AVM (Linux)

on:
  workflow_dispatch:
  push:
    tags:
      - 'research-v*'

env:
  TAG_NAME: ${{ github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      release_date: ${{ steps.date.outputs.DATE }}
      tag: ${{ env.TAG_NAME }}

    steps:
      - name: Get current date
        id: date
        run: echo "DATE=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Clone official AVM code
        uses: actions/checkout@v4
        with:
          repository: AOMediaCodec/avm
          ref: ${{ env.TAG_NAME }}
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt update -y
          sudo apt install -y build-essential cmake git nasm

      - name: Configure and build
        run: |
          mkdir -p avm_build
          cd avm_build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      # ==========================================
      # 【你指定的路径：avm_build/avmenc 和 avm_build/avmdec】
      # ==========================================
      - name: Copy binaries to root
        run: |
          cp avm_build/avmenc .
          cp avm_build/avmdec .

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: avm_linux_${{ steps.date.outputs.DATE }}
          path: |
            avmenc
            avmdec

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/research-v')
    runs-on: ubuntu-latest
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: avm_linux_${{ needs.build.outputs.release_date }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: avm_linux_${{ needs.build.outputs.release_date }}
          body: |
            AVM Linux 编译产物
            包含：avmenc、avmdec
          files: |
            avmenc
            avmdec
          draft: false
          prerelease: false
