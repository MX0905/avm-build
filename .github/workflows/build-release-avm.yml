name: Build AVM (Linux)

# 仅允许手动点击运行
on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      release_date: ${{ steps.date.outputs.DATE }}

    steps:
      - name: Get current date
        id: date
        run: echo "DATE=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Clone official AVM code
        uses: actions/checkout@v4
        with:
          repository: AOMediaCodec/avm
          ref: main
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y build-essential cmake git nasm

      - name: Build AVM
        run: |
          mkdir -p avm_build
          cd avm_build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      # 复制你指定的文件：avm_build/avmenc 和 avm_build/avmdec
      - name: Copy binaries
        run: |
          cp avm_build/avmenc .
          cp avm_build/avmdec .

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: avm_linux_${{ steps.date.outputs.DATE }}
          path: |
            avmenc
            avmdec

  # 自动发布 Release
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: avm_linux_${{ needs.build.outputs.release_date }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: avm_linux_${{ needs.build.outputs.release_date }}
          name: avm_linux_${{ needs.build.outputs.release_date }}
          body: |
            AVM Linux 编译产物
            包含：avmenc、avmdec
          files: |
            avmenc
            avmdec
          draft: false
          prerelease: false
