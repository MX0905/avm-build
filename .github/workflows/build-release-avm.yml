name: Build Official AVM (Linux)

# 触发规则
on:
  workflow_dispatch:
  push:
    tags:
      - 'research-v*'

env:
  TAG_NAME: ${{ github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc_version.outputs.VERSION }}
      tag: ${{ env.TAG_NAME }}

    steps:
      # 计算版本号
      - name: Calculate version number
        id: calc_version
        run: |
          if [[ "$TAG_NAME" == research-v* ]]; then
            VERSION=${TAG_NAME#research-v}
          else
            VERSION=unknown
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      # 拉取 AVM 官方源码
      - name: Clone official AOMediaCodec/avm
        uses: actions/checkout@v4
        with:
          repository: AOMediaCodec/avm
          ref: ${{ env.TAG_NAME }}
          fetch-depth: 0

      # 安装编译依赖（和本地一致）
      - name: Install build dependencies
        run: |
          sudo apt update -y
          sudo apt install -y build-essential cmake git nasm

      # 创建编译目录 avm_build
      - name: Create build directory
        run: |
          mkdir -p avm_build

      # CMake 配置（原生配置，不修改输出路径）
      - name: CMake configure
        run: |
          cd avm_build
          cmake .. -DCMAKE_BUILD_TYPE=Release

      # 多线程编译
      - name: Compile with make
        run: |
          cd avm_build
          make -j$(nproc)

      # 打包：直接压缩整个 avm_build 目录
      - name: Zip full build directory
        run: |
          zip -r AVM-Linux-${{ steps.calc_version.outputs.VERSION }}.zip avm_build/

      # 上传压缩包为制品
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AVM-Linux-${{ steps.calc_version.outputs.VERSION }}
          path: AVM-Linux-${{ steps.calc_version.outputs.VERSION }}.zip

  # 标签触发时自动创建 Release
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/research-v')
    runs-on: ubuntu-latest
    steps:
      - name: Download zip package
        uses: actions/download-artifact@v4
        with:
          name: AVM-Linux-${{ needs.build.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: AVM ${{ needs.build.outputs.version }} (Linux)
          body: |
            ### AVM 编译包 Linux 版本 ${{ needs.build.outputs.version }}
            官方仓库：AOMediaCodec/avm
            编译标签：${{ needs.build.outputs.tag }}
            内容：完整 avm_build 编译目录，可自行检查产物
          files: |
            AVM-Linux-${{ needs.build.outputs.version }}.zip
          draft: false
          prerelease: false
